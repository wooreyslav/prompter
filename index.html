<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="teplitsaPrompter">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="180x180" href="favicon-180.png">
<title>teplitsaPrompter</title>
<style>
/* шрифт подгружается динамически из settings */

:root {
  --bg:     #0a0a0a;
  --bg2:    #111111;
  --text:   #ffffff;
  --accent: #ff00bf;
  --dim:    rgba(255,255,255,0.55);
  --fade-dur: 110ms;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  height: 100%;
  /* учитываем safe area на iPhone (вырез, нижняя полоска) */
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font, 'Barlow Semi Condensed'), system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#progress {
  position: fixed;
  top: env(safe-area-inset-top); left: 0;
  height: 3px; width: 0%;
  background: var(--accent);
  transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index: 100;
  box-shadow: 0 0 8px var(--accent);
}

#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  /* учитываем статус-бар в standalone (iPad/iPhone) и скруглённые углы */
  height: calc(34px + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  font-size: 28px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-left: calc(16px + env(safe-area-inset-left));
  padding-right: calc(16px + env(safe-area-inset-right));
  z-index: 50;
  pointer-events: none;
}
#song-info {
  font-size: 0.48em;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  padding-top: 6px;
  font-family: var(--font, sans-serif);
}
#section-counter {
  font-size: 0.48em;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--dim);
  flex-shrink: 0;
  padding-top: 6px;
  font-family: var(--font, sans-serif);
}

#text {
  flex: 1;
  line-height: 1.35;
  /* верхний отступ = высота header + safe-area-inset-top */
  padding: calc(44px + env(safe-area-inset-top)) 32px 16px;
  white-space: pre-wrap;
  word-break: break-word;
  text-align: left;
  overflow: hidden;
  opacity: 1;
  transition: opacity var(--fade-dur) ease;
  font-weight: 600;
}

/* iPhone landscape: высота ~390px — жмём отступы */
@media (max-height: 430px) and (orientation: landscape) {
  #header { height: calc(26px + env(safe-area-inset-top)); }
  #text { padding: calc(32px + env(safe-area-inset-top)) 24px 8px; }
}
#text.fading { opacity: 0; }
#text .song-title { display: none; }

.label {
  font-size: 0.48em;
  font-weight: 400;
  color: var(--dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.2em;
}
.small-gap { height: 0.5em; display: block; }

/* ===== ПАНЕЛЬ УПРАВЛЕНИЯ ===== */
#controls-wrap {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 150;
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease;
}
#controls-wrap.hidden {
  transform: translateY(110%);
  opacity: 0;
  pointer-events: none;
}
#controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  background: var(--bg2);
  border-top: 1px solid rgba(255,255,255,0.08);
}
.ctrl-btn {
  background: transparent;
  color: var(--dim);
  border: none;
  border-right: 1px solid rgba(255,255,255,0.06);
  font-family: inherit;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px 4px;
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.ctrl-btn:last-child { border-right: none; }
.ctrl-btn:active, .ctrl-btn:hover {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}
.ctrl-btn .icon { font-size: 16px; line-height: 1; }

#open-editor {
  position: fixed;
  bottom: 12px; left: 12px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--dim);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  text-decoration: none;
}
#open-editor:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-color: rgba(255,255,255,0.25);
}

#toggle-controls {
  position: fixed;
  bottom: 12px; right: 12px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--dim);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
#toggle-controls.active {
  background: rgba(255,255,255,0.1);
  color: var(--text);
  border-color: rgba(255,255,255,0.3);
}

#loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--dim);
}

#swipe-hint {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 22px;
  color: var(--dim);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 300;
}
#swipe-hint.show { opacity: 1; }
</style>
</head>
<body>

<div id="progress"></div>
<div id="header">
  <div id="song-info"></div>
  <div id="section-counter"></div>
</div>
<div id="text"><div id="loading">загрузка…</div></div>

<div id="controls-wrap" class="hidden">
  <div id="controls">
    <button class="ctrl-btn" id="prevSong"><span class="icon">⏮</span><span>песня</span></button>
    <button class="ctrl-btn" id="prevSection"><span class="icon">◀</span><span>секция</span></button>
    <button class="ctrl-btn" id="nextSection"><span class="icon">▶</span><span>секция</span></button>
    <button class="ctrl-btn" id="nextSong"><span class="icon">⏭</span><span>песня</span></button>
  </div>
</div>

<button id="toggle-controls" title="Показать/скрыть кнопки">☰</button>
<a id="open-editor" href="editor.html" title="Открыть редактор">✎</a>
<div id="swipe-hint"></div>

<script>
const GOOGLE_FONTS = {
  'Barlow Semi Condensed': 'Barlow+Semi+Condensed:wght@400;600;700',
  'Oswald':                'Oswald:wght@400;500;600',
  'Roboto Condensed':      'Roboto+Condensed:wght@400;700',
  'PT Sans':               'PT+Sans:wght@400;700',
  'Nunito':                'Nunito:wght@400;600;700',
  'IBM Plex Mono':         'IBM+Plex+Mono:wght@400;700',
};

function loadFont(name) {
  const key = GOOGLE_FONTS[name];
  if (!key) return;
  const link = document.createElement('link');
  link.rel  = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + key + '&display=swap';
  document.head.appendChild(link);
}

function applySettings(s) {
  const r = document.documentElement.style;
  const cs = s.colorScheme || {};
  const accent   = cs.accent || '#ff00bf';
  const text     = cs.text   || '#ffffff';
  const contrast = s.contrast !== false;

  // берём bg/bg2 прямо из сохранённой схемы — не пересчитываем
  r.setProperty('--bg',     cs.bg  || '#0d0d0d');
  r.setProperty('--bg2',    cs.bg2 || '#141414');
  r.setProperty('--text',   text);
  r.setProperty('--accent', accent);
  r.setProperty('--dim', contrast
    ? blendToRgba(accent, 1.0, 0.80)   // контрастный: яркий акцент, хорошо виден
    : blendToRgba(accent, 0.55, 0.70)  // тёплый: заметно светлее (было 0.55)
  );

  const font = s.fontFamily || 'Barlow Semi Condensed';
  loadFont(font);
  r.setProperty('--font', "'" + font + "'");
  document.getElementById('text').style.lineHeight = (s.lineHeight || 1.35);
}

// вспомогательная: смешать акцент с серым и вернуть rgba
function blendToRgba(hex, brightness, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  // смешиваем с нейтральным серым (180,180,180) для снижения насыщенности
  const nr = Math.round(r * brightness + 180 * (1 - brightness));
  const ng = Math.round(g * brightness + 180 * (1 - brightness));
  const nb = Math.round(b * brightness + 180 * (1 - brightness));
  return 'rgba(' + nr + ',' + ng + ',' + nb + ',' + alpha + ')';
}

const SB_URL = 'https://dvkpkwktxpqhvlwarrej.supabase.co';
const SB_KEY = 'sb_publishable_3mkstnn9RW_zYCxpl-eTxw_IYSxUDYb';

fetch(SB_URL + '/rest/v1/prompter?id=eq.songs&select=data', {
  headers: {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY
  }
})
  .then(r => r.json())
  .then(rows => {
    if (!rows || !rows.length || !rows[0].data || !rows[0].data.songs) {
      // Supabase пустой — fallback на songs.json
      return fetch('songs.json').then(r => r.json());
    }
    return rows[0].data;
  })
  .then(data => {
    const settings = data.settings || {};
    const songsArr = Array.isArray(data) ? data : (data.songs || []);
    applySettings(settings);
    init(songsArr, settings);
  })
  .catch(err => {
    document.getElementById('loading').textContent = '⚠ ошибка загрузки';
    console.error(err);
  });

function buildSongTitle(song) {
  let t = song.title;
  if (song.cover) t += ' (' + song.cover + ' cover)';
  else if (song.bpm) t += ' · ' + song.bpm + ' bpm';
  return t;
}

function init(songsData, settings) {
  const maxFontSize = settings.fontSize || 48;
  const lineHeightMult = settings.lineHeight || 1.35;

  const songs = [], allSections = [], sectionMap = [];

  // autoJoin: если секция <= этого кол-ва строк И нет явного joinNext:false — объединяем со следующей
  const autoJoinThreshold = settings.autoJoinLines ?? 4;

  songsData.filter(s => !s.disabled).forEach((song, si) => {
    const title = buildSongTitle(song);
    const rawSecs = song.sections;

    // Группируем секции в «слайды»
    const slides = [];
    let i = 0;
    while (i < rawSecs.length) {
      const sec = rawSecs[i];
      const nonEmptyLines = sec.lines.filter(l => l.trim() !== '').length;
      const forceJoin  = sec.joinNext === true;
      const forceAlone = sec.joinNext === false;
      const autoJoin   = !forceAlone && nonEmptyLines <= autoJoinThreshold && i + 1 < rawSecs.length;

      if (forceJoin || autoJoin) {
        // объединяем текущую с следующей
        const next = rawSecs[i + 1];
        slides.push({
          html: sec.lines.join('\n') + '\n\n' + next.lines.join('\n'),
          label: sec.label + '  +  ' + next.label,
          songTitle: title
        });
        i += 2;
      } else {
        slides.push({
          html: sec.lines.join('\n'),
          label: sec.label,
          songTitle: title
        });
        i += 1;
      }
    }

    songs.push(slides);
    slides.forEach(s => { allSections.push(s); sectionMap.push(si); });
  });

  let current = 0;
  const textEl     = document.getElementById('text');
  const progressEl = document.getElementById('progress');
  const songInfoEl = document.getElementById('song-info');
  const counterEl  = document.getElementById('section-counter');

  // ===== PROBE для измерения =====
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;top:-9999px;left:0;visibility:hidden;pointer-events:none;white-space:pre-wrap;word-break:break-word;font-weight:600;';
  document.body.appendChild(probe);

  function adjustFontSize() {
    const cs     = getComputedStyle(textEl);
    const availW = textEl.clientWidth  - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    // Safari на iOS иногда даёт clientHeight чуть больше реального — берём запас 8px
    const availH = textEl.clientHeight - parseFloat(cs.paddingTop)  - parseFloat(cs.paddingBottom) - 8;

    probe.style.fontFamily = cs.fontFamily;
    probe.style.width      = availW + 'px';
    probe.innerHTML        = textEl.innerHTML;

    // Начинаем с желаемого размера. Если влезает — отлично, не трогаем.
    // Если не влезает — уменьшаем бинарным поиском до минимума 16px.
    probe.style.fontSize   = maxFontSize + 'px';
    probe.style.lineHeight = (maxFontSize * lineHeightMult) + 'px';

    let finalSize = maxFontSize;

    if (probe.scrollHeight > availH || probe.scrollWidth > availW) {
      // текст не влезает — ищем максимальный размер который влезет
      let lo = 16, hi = maxFontSize;
      while (hi - lo > 0.5) {
        const mid = (lo + hi) / 2;
        probe.style.fontSize   = mid + 'px';
        probe.style.lineHeight = (mid * lineHeightMult) + 'px';
        if (probe.scrollHeight <= availH && probe.scrollWidth <= availW) {
          lo = mid;
        } else {
          hi = mid;
        }
      }
      finalSize = lo * 0.97; // небольшой запас
    }

    textEl.style.fontSize   = finalSize + 'px';
    textEl.style.lineHeight = (finalSize * lineHeightMult) + 'px';
  }

  function showSection(idx, animate) {
    if (idx < 0) idx = 0;
    if (idx >= allSections.length) idx = allSections.length - 1;

    const render = () => {
      current = idx;
      const sec = allSections[idx];
      let html = sec.html.replace(/\n\n+/g, '\n<span class="small-gap"></span>');
      html = '<span class="label">[' + sec.label + ']</span>' + html;
      textEl.innerHTML = html;
      adjustFontSize();

      songInfoEl.textContent = sec.songTitle;
      const si    = sectionMap[idx];
      const first = sectionMap.indexOf(si);
      const last  = sectionMap.lastIndexOf(si);
      counterEl.textContent = (idx - first + 1) + '/' + (last - first + 1);
      progressEl.style.width = ((idx + 1) / allSections.length * 100) + '%';
    };

    if (animate) {
      textEl.classList.add('fading');
      setTimeout(() => { render(); textEl.classList.remove('fading'); }, 100);
    } else {
      render();
    }
  }

  const nextSection = () => showSection(current + 1, true);
  const prevSection = () => showSection(current - 1, true);
  const nextSong = () => {
    const s = sectionMap[current];
    if (s < songs.length - 1) showSection(sectionMap.indexOf(s + 1), true);
  };
  const prevSong = () => {
    const s = sectionMap[current];
    if (s > 0) showSection(sectionMap.indexOf(s - 1), true);
  };

  document.getElementById('prevSection').addEventListener('click', prevSection);
  document.getElementById('nextSection').addEventListener('click', nextSection);
  document.getElementById('prevSong').addEventListener('click', prevSong);
  document.getElementById('nextSong').addEventListener('click', nextSong);

  const wrap = document.getElementById('controls-wrap');
  const tog  = document.getElementById('toggle-controls');
  tog.addEventListener('click', () => {
    wrap.classList.toggle('hidden');
    const isOpen = !wrap.classList.contains('hidden');
    tog.classList.toggle('active', isOpen);
    // когда панель открыта — добавляем нижний padding чтобы текст не залезал под кнопки
    const textEl2 = document.getElementById('text');
    if (isOpen) {
      const h = document.getElementById('controls').offsetHeight;
      textEl2.style.paddingBottom = (h + 8) + 'px';
    } else {
      textEl2.style.paddingBottom = '';
    }
    // пересчитываем размер шрифта под новую высоту
    adjustFontSize();
  });

  window.addEventListener('keydown', e => {
    if (['ArrowRight','PageDown',' '].includes(e.key)) { nextSection(); e.preventDefault(); }
    else if (['ArrowLeft','PageUp'].includes(e.key))   { prevSection(); e.preventDefault(); }
    else if (e.key === 'ArrowDown') { nextSong();    e.preventDefault(); }
    else if (e.key === 'ArrowUp')   { prevSong();    e.preventDefault(); }
  });

  let tx0=0, ty0=0, tt0=0;
  const hint = document.getElementById('swipe-hint');
  let hintTimer;
  const flash = t => {
    clearTimeout(hintTimer);
    hint.textContent = t;
    hint.classList.add('show');
    hintTimer = setTimeout(() => hint.classList.remove('show'), 450);
  };
  textEl.addEventListener('touchstart', e => {
    tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; tt0 = Date.now();
  }, { passive: true });
  textEl.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx0;
    const dy = e.changedTouches[0].clientY - ty0;
    if (Date.now() - tt0 > 500 || Math.max(Math.abs(dx),Math.abs(dy)) < 40) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      dx < 0 ? (nextSection(), flash('▶')) : (prevSection(), flash('◀'));
    } else {
      dy < 0 ? (nextSong(), flash('⏭')) : (prevSong(), flash('⏮'));
    }
  }, { passive: true });

  showSection(0);
  window.addEventListener('resize', () => showSection(current));
}
</script>
</body>
</html>
